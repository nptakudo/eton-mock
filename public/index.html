<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eton</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body, #root {
    height: 100%;
    width: 100%;
    overflow: hidden;
  }
  body {
    background: #e8e8e8;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
  }

  .app-layout {
    display: flex;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  .sidebar {
    width: 220px;
    min-width: 220px;
    background: #f0efed;
    display: flex;
    flex-direction: column;
    height: 100%;
    border-right: 1px solid rgba(0,0,0,0.08);
    transition: width 0.25s cubic-bezier(0.4,0,0.2,1), min-width 0.25s cubic-bezier(0.4,0,0.2,1), opacity 0.2s ease;
    overflow: hidden;
    flex-shrink: 0;
  }
  .sidebar.collapsed {
    width: 0;
    min-width: 0;
    opacity: 0;
    border-right: none;
  }

  .titlebar {
    height: 52px;
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 8px;
    flex-shrink: 0;
    -webkit-app-region: drag;
  }

  .sidebar-toggle {
    width: 28px; height: 28px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: rgba(39, 37, 30, 0.42);
    transition: background 0.15s, color 0.15s;
    -webkit-app-region: no-drag;
  }
  .sidebar-toggle:hover { background: rgba(39,26,0,0.06); color: rgba(39,37,30,0.75); }

  .sidebar-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 6px 0 12px;
  }
  .sidebar-scroll::-webkit-scrollbar { display: none; }

  .search-wrap { padding: 0 8px 8px; }

  .search-box {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(39, 26, 0, 0.05);
    border-radius: 12px;
    padding: 0 8px;
    min-height: 40px;
    cursor: text;
    transition: background 0.15s;
  }
  .search-box:hover { background: rgba(39, 26, 0, 0.075); }
  .search-box input {
    background: none; border: none; outline: none;
    font-size: 13px; color: #27251E; flex: 1;
    font-family: inherit;
  }
  .search-box input::placeholder { color: rgba(39, 37, 30, 0.45); }
  .search-box kbd { font-size: 12px; color: rgba(39, 37, 30, 0.4); background: transparent; border: none; font-family: inherit; }

  .nav-section { padding: 0 8px; margin-bottom: 2px; }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 8px;
    min-height: 36px;
    padding: 0 8px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.12s;
    user-select: none;
    position: relative;
  }
  .nav-item:hover { background: rgba(39, 26, 0, 0.05); }
  .nav-item.active { background: rgba(39, 26, 0, 0.07); }
  .nav-item.active .nav-label { color: #27251E; font-weight: 500; }

  .section-chevron {
    opacity: 0;
    transition: opacity 0.15s, transform 0.2s;
    color: rgba(39, 37, 30, 0.35);
    display: flex; align-items: center;
    flex-shrink: 0;
  }
  .section-chevron.closed { transform: rotate(-90deg); }
  .nav-item:hover .section-chevron { opacity: 1; }

  .nav-icon { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; color: rgba(39, 37, 30, 0.65); flex-shrink: 0; }
  .nav-label {
    font-size: 13px;
    line-height: 17px;
    font-weight: 400;
    color: rgba(39, 37, 30, 0.65);
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: 0;
  }
  .nav-meta { font-size: 11px; color: rgba(39, 37, 30, 0.4); flex-shrink: 0; }

  .divider { height: 1px; background: rgba(39,26,0,0.07); margin: 8px 10px; }

  .space-row {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 8px 4px 32px; border-radius: 8px;
    cursor: pointer; transition: background 0.1s;
  }
  .space-row:hover { background: rgba(39,26,0,0.05); }
  .space-label { font-size: 13px; color: rgba(39, 37, 30, 0.65); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .add-item {
    display: flex; align-items: center; gap: 8px;
    min-height: 32px;
    padding: 0 8px 0 32px; border-radius: 10px;
    cursor: pointer; transition: background 0.1s; color: rgba(39, 37, 30, 0.45);
    font-size: 13px;
  }
  .add-item:hover { background: rgba(39,26,0,0.05); color: rgba(39, 37, 30, 0.8); }
  .add-item.active { background: rgba(39,26,0,0.07); color: #27251E; }
  .add-item span { font-size: 12px; }

  .sidebar-bottom {
    padding: 8px 6px;
    border-top: 1px solid rgba(39,26,0,0.07);
    flex-shrink: 0;
  }
  .bottom-icons { display: flex; align-items: center; gap: 2px; padding: 0 2px 8px; }
  .bottom-icon {
    width: 32px; height: 32px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: rgba(39, 37, 30, 0.58); transition: background 0.12s, color 0.12s;
    position: relative;
  }
  .bottom-icon:hover { background: rgba(39,26,0,0.07); color: rgba(39, 37, 30, 0.9); }
  .bottom-icon.active { color: #27251E; background: rgba(39,26,0,0.07); }

  .user-row {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 6px; border-radius: 10px;
    cursor: pointer; transition: background 0.1s;
  }
  .user-row:hover { background: rgba(39,26,0,0.05); }
  .avatar {
    width: 24px; height: 24px; border-radius: 50%;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: white; font-weight: 600; flex-shrink: 0;
  }
  .user-name { font-size: 12.5px; color: rgba(39,37,30,0.75); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .user-caret { color: rgba(39,37,30,0.35); }

  /* Main content */
  .main-content {
    flex: 1;
    background: #faf9f8;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }
  .main-topbar {
    height: 52px;
    border-bottom: 1px solid rgba(0,0,0,0.07);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 4px;
    flex-shrink: 0;
    background: #faf9f8;
  }
  .topbar-left { display: flex; align-items: center; gap: 4px; flex: 1; }
  .topbar-right { display: flex; align-items: center; gap: 6px; }

  .topbar-breadcrumb {
    font-size: 13px; color: #aaa;
    display: flex; align-items: center; gap: 4px;
    padding: 0 4px;
  }
  .topbar-breadcrumb span { color: #1a1a1a; font-weight: 500; }

  .tab {
    font-size: 13px; color: #888; padding: 5px 10px;
    border-radius: 6px; cursor: pointer;
    transition: background 0.1s, color 0.1s;
  }
  .tab:hover { background: rgba(0,0,0,0.05); color: #333; }
  .tab.active { color: #1a1a1a; font-weight: 500; }
  .tab-badge {
    display: inline-flex; align-items: center; justify-content: center;
    background: #e5e4e2; color: #666; border-radius: 10px;
    padding: 1px 6px; font-size: 11px; margin-left: 4px;
  }

  /* Topbar action buttons */
  .topbar-btn {
    display: flex; align-items: center; gap: 5px;
    font-size: 12px; color: #555; background: none;
    border: 1px solid #d8d6d0; border-radius: 6px;
    padding: 4px 10px; cursor: pointer; font-family: inherit;
    transition: background 0.12s;
  }
  .topbar-btn:hover { background: #f0ede8; }
  .topbar-btn-primary {
    background: oklch(20% 0.03 72); color: #fff; border-color: oklch(20% 0.03 72);
  }
  .topbar-btn-primary:hover { background: oklch(27% 0.03 72); }

  /* Main body content */
  .main-body { flex: 1; overflow-y: auto; }

  /* Report styles */
  .report-page { padding: 36px 40px 56px; overflow-y: auto; flex: 1; }
  .report-header { margin-bottom: 28px; }
  .report-version { float: right; font-size: 11px; color: #aaa; background: #eee; border-radius: 4px; padding: 2px 7px; margin-top: 4px; }
  .report-h1 { font-size: 20px; font-weight: 800; color: #111; line-height: 1.2; text-transform: uppercase; letter-spacing: -0.01em; margin-bottom: 16px; }
  .export-btn {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 12px; color: #555; background: none;
    border: 1px solid #d8d6d0; border-radius: 6px;
    padding: 4px 10px; cursor: pointer; font-family: inherit;
    transition: background 0.12s; margin-bottom: 14px;
  }
  .export-btn:hover { background: #f0ede8; }
  .report-summary { font-size: 13px; color: #444; line-height: 1.65; margin-bottom: 16px; max-width: 560px; }
  .report-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .report-tag { background: #eae9e4; border-radius: 5px; padding: 3px 8px; font-size: 11.5px; color: #555; }
  /* Color tags by type: framework tags get their hue, recording tag stays warm paper */
  .report-tags .report-tag:nth-child(1) { background: oklch(93% 0.04 250); color: oklch(28% 0.08 250); }
  .report-tags .report-tag:nth-child(2) { background: oklch(93% 0.04 145); color: oklch(28% 0.07 145); }
  .report-tags .report-tag:nth-child(3) { background: oklch(95% 0.02 70); color: oklch(36% 0.05 70); }
  .report-model { font-size: 12px; color: #888; margin-bottom: 12px; }
  /* border-left stripe replaced with background tint — see absolute_bans */
  .report-disclaimer { font-size: 12px; color: #999; font-style: italic; background: rgba(39,26,0,0.03); border-radius: 6px; padding: 10px 14px; margin-bottom: 28px; }

  .report-section { background: #fff; border: 1px solid rgba(0,0,0,0.07); border-radius: 10px; margin-bottom: 16px; overflow: hidden; }
  .report-section-header { padding: 20px 22px 0; }
  .report-section-title { font-size: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.02em; color: #111; margin-bottom: 10px; }
  .report-section-body { font-size: 13px; color: #444; line-height: 1.65; margin-bottom: 12px; max-width: 640px; }
  .report-bullets { padding: 0 22px; margin-bottom: 14px; list-style: none; }
  .report-bullets li { font-size: 13px; color: #444; line-height: 1.6; padding: 5px 0; }
  .report-bullets li::before { content: "* "; color: #aaa; }
  .evidence-ref {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 22px;
    height: 22px;
    border-radius: 999px;
    background: #f2f0eb;
    color: #666;
    font-size: 12px;
    font-weight: 600;
    line-height: 1;
    cursor: default;
    transition: background 0.12s, color 0.12s;
  }
  .ref-wrap:hover .evidence-ref { background: #e8e4dd; color: #333; }
  /* Amber for framework citations — distinct from timestamp red */
  .evidence-ref.fw { background: oklch(95% 0.025 70); color: oklch(50% 0.10 70); }
  .ref-wrap:hover .evidence-ref.fw { background: oklch(90% 0.04 70); color: oklch(36% 0.11 70); }

  .ref-wrap {
    position: relative;
    display: inline-flex;
    align-items: center;
    vertical-align: top;
    margin-left: 5px;
  }
  .ref-hover-card {
    position: fixed;
    width: 276px;
    background: #fff;
    border: 1px solid rgba(0,0,0,0.09);
    border-radius: 10px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.12);
    padding: 11px 13px;
    z-index: 9999;
    pointer-events: none;
  }
  .ref-hover-meta { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; }
  .ref-hover-quote { font-size: 12.5px; color: #222; font-style: italic; line-height: 1.5; margin-bottom: 5px; }
  .ref-hover-reason { font-size: 11.5px; color: #999; line-height: 1.5; }

  .fw-ref-card { background: #faf9f6; border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; border: 1px solid rgba(0,0,0,0.05); }
  .fw-ref-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 5px; }
  .fw-ref-source { font-size: 12.5px; font-weight: 700; color: #222; }
  .fw-ref-page { font-size: 11px; color: #888; font-family: ui-monospace, 'SFMono-Regular', monospace; }
  .fw-ref-quote { font-size: 12.5px; color: #333; font-style: italic; line-height: 1.5; margin-bottom: 5px; }
  .fw-ref-reason { font-size: 12px; color: #999; line-height: 1.5; }

  .accordion-toggle {
    display: flex; align-items: center; gap: 5px;
    padding: 11px 22px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.06em;
    text-transform: uppercase; color: #888;
    cursor: pointer; user-select: none;
    transition: color 0.12s;
    border-top: 1px solid rgba(0,0,0,0.05);
  }
  .accordion-toggle:hover { color: oklch(48% 0.08 70); }
  .accordion-content { padding: 0 16px 14px; }

  .evidence-card { background: #faf9f6; border-radius: 8px; padding: 12px 14px; margin-bottom: 10px; border: 1px solid rgba(0,0,0,0.05); }
  .evidence-card-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .evidence-card-ts { font-size: 12px; font-weight: 600; color: #c0392b; font-variant-numeric: tabular-nums; }
  .evidence-card-speaker { font-size: 11.5px; color: #888; }
  .evidence-card-quote { font-size: 13px; color: #222; font-style: italic; line-height: 1.5; margin-bottom: 6px; }
  .evidence-card-reason { font-size: 12px; color: #999; line-height: 1.5; }

  .next-steps-section { margin-top: 36px; margin-bottom: 24px; }
  .next-steps-title { font-size: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.02em; color: #111; margin-bottom: 16px; }
  .next-steps-list { list-style: none; counter-reset: steps; }
  .next-steps-list li { counter-increment: steps; display: flex; gap: 14px; align-items: flex-start; font-size: 13px; color: #444; line-height: 1.6; margin-bottom: 12px; max-width: 640px; }
  .next-steps-list li::before { content: counter(steps); font-size: 12px; font-weight: 600; color: oklch(62% 0.09 70); min-width: 20px; margin-top: 2px; }

  .report-feedback-card {
    margin-top: 40px;
    margin-bottom: 40px;
    background: #faf9f6;
    border: 1px solid rgba(0,0,0,0.05);
    border-radius: 10px;
    padding: 20px 22px;
  }
  .report-feedback-title { font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.02em; color: #111; margin-bottom: 8px; }
  .report-feedback-copy { font-size: 12.5px; color: #777; line-height: 1.55; margin-bottom: 12px; max-width: 560px; }
  .report-feedback-textarea {
    width: 100%;
    border: 1px solid #d8d6d0;
    border-radius: 8px;
    background: #fff;
    color: #222;
    font: inherit;
    box-sizing: border-box;
    transition: border-color 0.12s, box-shadow 0.12s;
  }
  .report-feedback-textarea {
    min-height: 96px;
    resize: vertical;
    padding: 12px;
    font-size: 12px;
    line-height: 1.5;
  }
  .report-feedback-textarea:focus {
    outline: none;
    border-color: #a8a39a;
    box-shadow: 0 0 0 3px rgba(168,163,154,0.14);
  }
  .report-feedback-actions { display: flex; align-items: center; justify-content: flex-end; gap: 12px; margin-top: 14px; }
  .report-feedback-status { font-size: 12px; color: #2f6d48; font-weight: 600; }
  .report-feedback-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 120px;
    height: 36px;
    padding: 0 14px;
    border: 1px solid #d8d6d0;
    border-radius: 8px;
    background: #fff;
    color: #444;
    font: inherit;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s, opacity 0.12s;
  }
  .report-feedback-btn:hover {
    background: #f0ede8;
    border-color: #cfcac2;
  }
  .report-feedback-btn:disabled { opacity: 0.45; cursor: not-allowed; }

  /* Evidence tab */
  .evidence-list { padding: 20px 24px; overflow-y: auto; flex: 1; }
  .evidence-entry { padding: 14px 16px; background: #fff; border-radius: 10px; margin-bottom: 10px; border: 1px solid rgba(0,0,0,0.06); cursor: pointer; transition: background 0.12s; }
  .evidence-entry:hover { background: #faf9f7; }
  .evidence-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
  .evidence-timestamp { font-size: 12px; color: #999; font-variant-numeric: tabular-nums; letter-spacing: 0.01em; }
  .evidence-speaker { font-size: 11.5px; color: #666; background: #f0ede8; border: 1px solid #e0dcd6; border-radius: 20px; padding: 2px 9px; }
  .evidence-text { font-size: 13.5px; color: #222; line-height: 1.55; }

  /* History tab */
  .history-list { padding: 24px 32px; overflow-y: auto; flex: 1; }
  .history-date-group { margin-bottom: 24px; }
  .history-date-label { font-size: 12px; font-weight: 600; color: #999; margin-bottom: 8px; letter-spacing: 0.01em; }
  .history-item { display: flex; align-items: center; gap: 12px; padding: 9px 10px; border-radius: 8px; cursor: pointer; transition: background 0.12s; }
  .history-item:hover { background: rgba(0,0,0,0.04); }
  .history-doc-icon { width: 34px; height: 34px; background: #eae9e5; border-radius: 7px; display: flex; align-items: center; justify-content: center; color: #888; flex-shrink: 0; }
  .history-info { flex: 1; min-width: 0; }
  .history-title { font-size: 13.5px; color: #1a1a1a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .history-sub { font-size: 12px; color: #aaa; margin-top: 1px; }
  .history-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .history-fw-pill { display: flex; align-items: center; gap: 5px; border: 1px solid #d8d6d0; border-radius: 20px; padding: 3px 8px 3px 6px; background: #f5f4f0; }
  .history-fw-pill span { font-size: 11.5px; color: #555; }
  .pill-actions { display: flex; align-items: center; gap: 2px; margin-left: 2px; }
  .pill-btn { width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #888; transition: background 0.1s, color 0.1s; flex-shrink: 0; }
  .pill-btn:hover { background: rgba(0,0,0,0.08); color: #333; }
  .history-time { font-size: 12px; color: #aaa; white-space: nowrap; min-width: 56px; text-align: right; }
  .history-time sup { font-size: 9px; text-transform: uppercase; }

  /* Upload panel */
  .upload-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100;
    display: flex; align-items: center; justify-content: center;
    animation: fadeIn 0.15s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .upload-modal {
    background: #fff; border-radius: 14px; padding: 28px 32px;
    width: 480px; max-width: 90vw;
    box-shadow: 0 24px 60px rgba(0,0,0,0.2), 0 0 0 1px rgba(0,0,0,0.06);
    animation: slideUp 0.2s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .upload-modal-title { font-size: 16px; font-weight: 700; color: #111; margin-bottom: 4px; }
  .upload-modal-sub { font-size: 13px; color: #888; margin-bottom: 20px; }
  .upload-drop {
    border: 2px dashed #d8d6d0; border-radius: 10px;
    padding: 32px 20px; text-align: center; cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    margin-bottom: 16px; color: #aaa;
  }
  .upload-drop:hover, .upload-drop.drag { border-color: #888; background: #faf9f6; color: #666; }
  .upload-drop-icon { margin-bottom: 10px; }
  .upload-drop-text { font-size: 13px; margin-bottom: 4px; color: #555; }
  .upload-drop-hint { font-size: 12px; color: #aaa; }
  .upload-file-list { margin-bottom: 16px; }
  .upload-file-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: #f5f4f0; border-radius: 8px; margin-bottom: 6px; }
  .upload-file-name { font-size: 13px; color: #333; flex: 1; }
  .upload-file-size { font-size: 11.5px; color: #aaa; }
  .upload-modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .modal-btn { font-size: 13px; padding: 7px 16px; border-radius: 7px; cursor: pointer; font-family: inherit; border: 1px solid #d8d6d0; background: none; color: #555; transition: background 0.12s; }

  /* Framework selector */
  .fw-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .fw-card {
    padding: 10px 12px; border-radius: 8px; border: 1.5px solid #e0dcd6;

  .fw-card-label { font-size: 12.5px; color: #333; font-weight: 500; }

  /* Chat box */
  .chat-box {
    background: #fff;
    border: 1.5px solid #f5b8b8;
    border-radius: 14px;
    overflow: visible;
    margin-bottom: 36px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    transition: border-color 0.15s, box-shadow 0.15s;

  .chat-box:focus-within {
    border-color: #e07070;
    box-shadow: 0 4px 20px rgba(0,0,0,0.07);
  }
  .chat-box-scope {
    display: flex; align-items: center; gap: 6px;
    padding: 12px 14px 4px;
  }
  .chat-scope-btn {
    display: flex; align-items: center; gap: 4px;
    font-size: 12.5px; color: #555; font-weight: 500;
    background: none; border: none; cursor: pointer;
    font-family: inherit; padding: 3px 6px; border-radius: 6px;
    transition: background 0.12s;
  }
  .chat-scope-btn:hover { background: rgba(0,0,0,0.05); }
  .chat-scope-sep { color: #ccc; font-size: 12px; }

  /* Framework dropdown */
  .fw-dropdown-wrap { position: relative; }
  .fw-dropdown-trigger {
    display: inline-flex; align-items: center; gap: 5px;
    height: 28px;
    font-size: 12px; color: #333; font-weight: 500;
    background: #f5f4f0; border: 1px solid #d8d6d0;
    border-radius: 20px; padding: 0 8px 0 6px;
    cursor: pointer; font-family: inherit;
    transition: background 0.12s, box-shadow 0.12s;
    white-space: nowrap; max-width: 200px;
  }
  .fw-dropdown-trigger:hover { background: #eee9e2; }
  .fw-chips { display: inline-flex; align-items: center; overflow: hidden; }
  .fw-chip {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 12px; font-weight: 500; color: #333;
    padding: 2px 8px; border-radius: 20px;
    white-space: nowrap;
  }
  .fw-chip-icon { font-size: 12px; flex-shrink: 0; }

  /* Stacked icon avatars inside fw trigger */
  .fw-stack { display: inline-flex; align-items: center; }
  .fw-stack-icon {
    width: 20px; height: 20px; border-radius: 50%;
    border: 1.5px solid #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; margin-left: -5px; flex-shrink: 0;
  }
  .fw-stack-icon:first-child { margin-left: 0; }
  .fw-trigger-label { font-size: 12.5px; font-weight: 500; color: #333; margin-left: 6px; }
  .fw-trigger-count { font-size: 12px; color: #999; margin-left: 4px; font-weight: 400; }
  .fw-menu {
    position: absolute; top: calc(100% + 6px); left: 0; z-index: 120;
    background: #fff; border: 1px solid rgba(0,0,0,0.10);
    border-radius: 12px; box-shadow: 0 6px 24px rgba(0,0,0,0.12);
    padding: 6px; min-width: 190px;
  }
  .fw-menu-item {
    display: flex; align-items: center; gap: 9px;
    padding: 7px 10px; border-radius: 8px; cursor: pointer;
    font-size: 13px; color: #222; transition: background 0.1s;
    user-select: none;
  }
  .fw-menu-item:hover { background: #f5f4f0; }
  .fw-checkbox {
    width: 15px; height: 15px; border-radius: 4px; flex-shrink: 0;
    border: 1.5px solid #ccc; background: #fff;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.12s, border-color 0.12s;
  }
  .fw-checkbox.checked { background: oklch(20% 0.03 72); border-color: oklch(20% 0.03 72); }
  .fw-menu-label { flex: 1; }
  .fw-menu-icon { font-size: 14px; }

  /* Video source dropdown (reuses fw-dropdown patterns) */
  .vid-menu {
    position: absolute; top: calc(100% + 6px); left: 0; z-index: 120;
    background: #fff; border: 1px solid rgba(0,0,0,0.10);

  .chat-box-footer {

  }
  .chat-send-btn:hover { background: oklch(27% 0.03 72); }
  .chat-send-btn.empty { background: #e5e3df; color: #aaa; cursor: default; }

  .chat-model-wrap { position: relative; }
  .chat-model-menu {
    position: absolute;
    bottom: calc(100% + 8px);

    min-width: 232px;

  .chat-model-item {
    display: flex; align-items: center; gap: 10px;

  }

  .chat-model-icon {

  /* Empty state */
  .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #aaa; gap: 12px; padding: 40px; text-align: center; }
  .empty-state-icon { width: 48px; height: 48px; background: #eae9e5; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #bbb; margin-bottom: 4px; }

  /* Search results */

  /* My Uploads page */

/* ── Evidence hover-ref pill ── */
function HoverRef({ refData, label }) {
  const [cardPos, setCardPos] = React.useState(null);
  const wrapRef = React.useRef();
  const CARD_W = 276;
  const GAP = 8;

  const handleMouseEnter = () => {
    if (!wrapRef.current) return;
    const r = wrapRef.current.getBoundingClientRect();
    const idealLeft = r.left + r.width / 2 - CARD_W / 2;
    const left = Math.max(GAP, Math.min(idealLeft, window.innerWidth - CARD_W - GAP));
    setCardPos({ top: r.top - GAP, left });
  };

  return (
    <span
      ref={wrapRef}
      className="ref-wrap"
      onMouseEnter={handleMouseEnter}
      onMouseLeave={() => setCardPos(null)}
    >
      <span className={`evidence-ref${refData.type === 'framework' ? ' fw' : ''}`}>{label}</span>
      {cardPos && (
        <div
          className="ref-hover-card"
          style={{ top: cardPos.top, left: cardPos.left, transform: 'translateY(-100%)' }}
        >
          {refData.type === 'framework' ? (
            <>
              <div className="fw-ref-header" style={{marginBottom:5}}>
                <span className="fw-ref-source">{refData.source}</span>
                <span className="fw-ref-page">{refData.page}</span>
              </div>
              <div className="ref-hover-quote">{refData.quote}</div>
              <div className="ref-hover-reason">{refData.reason}</div>
            </>
          ) : (
            <>
              <div className="ref-hover-meta">
                <span className="evidence-card-ts">[{refData.ts}]</span>
                <span className="evidence-card-speaker">{refData.speaker}</span>
              </div>
              <div className="ref-hover-quote">{refData.quote}</div>
              <div className="ref-hover-reason">{refData.reason}</div>
            </>
          )}
        </div>
      )}
    </span>
  );
}

          </button>
          {modelOpen && (
            <div className="chat-model-menu" role="listbox">
              {chatModelOptions.map(m => (
                <div
                  key={m.id}
                  className="chat-model-item"
                  role="option"
                  aria-selected={modelId === m.id}
                  onClick={() => pickModel(m.id)}>
                  <span className="chat-model-icon"><m.Icon /></span>
                  {m.label}
                  {modelId === m.id && <span className="chat-model-check"><IconCheck /></span>}
                </div>
              ))}
            </div>
          )}
        </div>
        <button
          className={`chat-send-btn${!value.trim() ? ' empty' : ''}`}
          onClick={() => value.trim() && setValue('')}
          title="Send">
          <IconEnter />
        </button>
      </div>
    </div>
  );
}

                  <div className="upload-item-thumb">
                    <img src="demo_img.jpg" alt={vid.title}
                      onError={e => { e.target.style.display='none'; e.target.parentNode.innerHTML='<span style="font-size:18px">🎬</span>'; }} />
                  </div>
                  <div className="upload-item-info">
                    <div className="upload-item-title">{vid.title}</div>
                    <div className="upload-item-meta">
                      <span>{vid.duration}</span>
                      <span>·</span>
                      <span>{vid.date}</span>
                      <span>·</span>
                      <span>{vid.speakers.length} speakers</span>
                    </div>
                  </div>
                  <div className="upload-item-status">
                    <div className="upload-item-status-dot" />
                    Processed
                  </div>
                </div>
              ))}
            </div>
          ) : activeNav === 'artifacts-prompts' ? (
            <div className="prompts-page">
              <div className="prompts-page-header">
                <div className="prompts-page-title">Prompts</div>
                <button className="topbar-btn">
                  <IconPlus /> New Prompt
                </button>
              </div>
              <div className="prompts-grid">
                {promptsData.map((p, i) => (
                  <div key={i} className="prompt-card" onClick={() => setSelectedPrompt(p)}>
                    <div className="prompt-card-title">{p.title}</div>
                    <div className="prompt-card-desc">{p.desc}</div>
                    <div className="prompt-card-footer">
                      <div className="prompt-card-source">
                        <IconUser />
                        Admin
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          ) : activeNav.startsWith('space-video-') ? (() => {
            const vid = processedVideos.find(v => 'space-video-'+v.id === activeNav);
            return vid ? <VideoSpaceView video={vid} /> : (
              <div className="empty-state"><div className="empty-state-title">Recording not found</div></div>
            );
          })() : (
            <div className="empty-state">
              <div className="empty-state-title" style={{color:'#aaa'}}>Nothing here.</div>
            </div>
          )}
        </div>
      </div>
      {selectedPrompt && <PromptModal prompt={selectedPrompt} onClose={() => setSelectedPrompt(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<div id="root"></div>
</body>
</html>
